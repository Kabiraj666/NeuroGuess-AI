services:
  # Flask API (model inference, telemetry, leaderboard)
  - type: web
    name: neuroguess-ai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11

  # Static frontend (index.html, scripts, styles, assets)
  - type: web
    name: neuroguess-ai-frontend
    runtime: static
    buildCommand: echo "no build step needed"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
